services:

  frontend:
    build: ./frontend
    container_name: ecommerce-frontend
    ports:
      - 5173:5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: ecommerce-api
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres-local

  postgres-local:
    image: postgres:18.1-alpine
    container_name: postgres-local
    env_file:
      - ./backend/.env
    ports:
      - "5433:5432"
    volumes:
      - pgdata-local:/var/lib/postgresql/data

volumes:
  pgdata-local: