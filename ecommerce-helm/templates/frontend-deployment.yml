apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: {{.Values.frontend.replicas}}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: frontend
          image: "{{.Values.frontend.image}}:{{.Values.frontend.tag}}"
          ports:
            - containerPort: 5173
          imagePullPolicy: Always
